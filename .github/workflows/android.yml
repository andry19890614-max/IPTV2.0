name: Build APK

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  # 🔥 Ставимо Java
  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: 17
      cache: gradle

  # 🔥 Завантажуємо нормальний Gradle 8.7 і генеруємо wrapper
  - name: Generate Gradle Wrapper
    run: |
      curl -L https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
      unzip -q gradle.zip
      ./gradle-8.7/bin/gradle wrapper --gradle-version 8.7

  # 🔐 Даємо права
  - name: Make gradlew executable
    run: chmod +x ./gradlew

  # 🔍 (опціонально, але корисно)
  - name: Show project structure
    run: ls -R

  # 🔥 Збірка APK
  - name: Build APK
    run: ./gradlew clean assembleDebug --no-daemon

  # 📦 Завантаження APK
  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: app-debug
      path: app/build/outputs/apk/debug/*.apk
```
